services:
  db:
    image: postgres:16
    container_name: challengetracker_db


    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: challengeTracker

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  backend:
    build: .
    
    container_name: 
      challengetracker_backend

    depends_on:
      - db

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/challengeTracker

volumes:
  postgres_data:
